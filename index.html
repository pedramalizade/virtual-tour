<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="pannellum.css">
<script src="pannellum.js"></script>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#panorama{
    width:100%;
    height:100vh;

    transition:
        transform .7s ease,
        opacity .7s ease,
        filter .7s ease;

    transform-origin:center center;
}

.zooming{
    transform:scale(1.25);
    opacity:0;
    filter:blur(2px);
}

</style>

</head>

<body>

<div id="panorama"></div>

<script>

const viewer = pannellum.viewer('panorama',{

    default:{
        firstScene:"room1"
    },

    scenes:{

        room1:{

            type:"equirectangular",

            panorama:"room1.png",

            hotSpots:[

                {

                    pitch:0,

                    yaw:80,

                    type:"info",

                    text:"برو اتاق بعدی",
                    clickHandlerFunc:function(){

                        changeSceneSmooth("room2");

                    }

                }

            ]

        },

        room2:{

            type:"equirectangular",

            panorama:"room2.png",

            hotSpots:[

                {

                    pitch:0,

                    yaw:-95,

                    type:"info",

                    text:"برگرد",
                    clickHandlerFunc:function(){

                        changeSceneSmooth("room1");

                    }

                }

            ]

        }

    }

});

function changeSceneSmooth(scene){

    const pano = document.getElementById("panorama");

    pano.classList.add("zooming");

    setTimeout(function(){

        if(scene === "room2"){
            viewer.loadScene(scene, 0, 90, 1000);
        }
        else{
            viewer.loadScene(scene, 0, 90, 1000);
        }

        pano.classList.remove("zooming");

    },650);

}

</script>

</body>
</html>
